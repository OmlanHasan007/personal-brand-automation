name: Weekly Paper Digest

on:
  schedule:
    - cron: '0 8 * * 5'   # Every Friday at 08:00 UTC
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and summarise papers
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py papers --feed arxiv_cs_lg --limit 5 --save

      - name: Upload digest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper-digest-${{ github.run_number }}
          path: logs/digest_*.md
          retention-days: 30
