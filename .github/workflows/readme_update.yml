name: Update GitHub Profile README

on:
  schedule:
    - cron: '0 22 * * 0'   # Every Sunday 22:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-readme:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ] || [ -z "${{ secrets.GITHUB_USERNAME }}" ]; then
            echo "WARNING: GITHUB_USERNAME secret not set. Skipping profile README update."
            echo "Set GITHUB_USERNAME in repo Settings -> Secrets -> Actions"
            exit 0
          fi
          echo "Secrets OK."

      - name: Update profile README
        env:
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ secrets.GITHUB_USERNAME }}
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
        run: python main.py readme --dry-run || echo "README update skipped (profile repo may not exist yet)."
