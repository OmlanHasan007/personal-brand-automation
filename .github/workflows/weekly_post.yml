name: Weekly LinkedIn Post

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday at 07:00 UTC (09:00 Dresden time)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and publish LinkedIn post
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_CLIENT_ID:      ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET:  ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN:   ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN:     ${{ secrets.LINKEDIN_PERSON_URN }}
        run: |
          # Auto-pick topic based on week number to avoid repetition
          WEEK=$(date +%V)
          TOPICS=("project" "learning" "paper" "insight" "progress")
          TOPIC=${TOPICS[$((WEEK % 5))]}
          echo "This week's topic: $TOPIC"
          python main.py post --topic $TOPIC --tone professional --publish
